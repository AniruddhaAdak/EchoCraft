<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAE8FF" />
      <stop offset="0.5" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#E0F2FE" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.96" />
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.88" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#bg)" />
  <circle cx="180" cy="86" r="78" fill="#F0ABFC" fill-opacity="0.35" filter="url(#blur)">
    <animate attributeName="cy" values="86;66;86" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1050" cy="90" r="88" fill="#7DD3FC" fill-opacity="0.32" filter="url(#blur)">
    <animate attributeName="cy" values="90;112;90" dur="6s" repeatCount="indefinite" />
  </circle>

  <g transform="translate(70 60)">
    <rect width="520" height="240" rx="28" fill="url(#card)" stroke="#F5D0FE" />
    <text x="36" y="54" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#A21CAF">AI transcription studio</text>
    <text x="36" y="98" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#0F172A">EchoCraft</text>
    <text x="36" y="138" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Capture audio. Transcribe it. Translate it.</text>
    <text x="36" y="166" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Turn it into blogs and social posts.</text>

    <rect x="36" y="188" width="152" height="38" rx="19" fill="#C026D3" />
    <text x="68" y="212" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Start with audio</text>

    <rect x="204" y="188" width="166" height="38" rx="19" fill="#FFFFFF" stroke="#E2E8F0" />
    <text x="238" y="212" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">Explore workspace</text>
  </g>

  <g transform="translate(650 52)">
    <rect width="470" height="256" rx="28" fill="url(#card)" stroke="#DBEAFE" />
    <text x="30" y="42" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A">Workflow preview</text>

    <g transform="translate(30 68)">
      <rect width="120" height="126" rx="22" fill="#FDF2F8" stroke="#FBCFE8">
        <animate attributeName="y" values="0;-6;0" dur="4.5s" repeatCount="indefinite" />
      </rect>
      <text x="20" y="34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#9D174D">1. Upload</text>
      <text x="20" y="58" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">Audio or mic</text>
      <text x="20" y="78" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">recording</text>
    </g>

    <g transform="translate(176 68)">
      <rect width="120" height="126" rx="22" fill="#EEF2FF" stroke="#C7D2FE">
        <animate attributeName="y" values="0;6;0" dur="5s" repeatCount="indefinite" />
      </rect>
      <text x="16" y="34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#4338CA">2. Transcript</text>
      <text x="16" y="58" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">Insights,</text>
      <text x="16" y="78" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">translation, export</text>
    </g>

    <g transform="translate(322 68)">
      <rect width="120" height="126" rx="22" fill="#ECFEFF" stroke="#A5F3FC">
        <animate attributeName="y" values="0;-5;0" dur="4.8s" repeatCount="indefinite" />
      </rect>
      <text x="15" y="34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0F766E">3. Content</text>
      <text x="15" y="58" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">Blog drafts and</text>
      <text x="15" y="78" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">social copy</text>
    </g>

    <path d="M150 132H174" stroke="#C026D3" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 30;30 0;0 30" dur="2.5s" repeatCount="indefinite" />
    </path>
    <path d="M296 132H320" stroke="#0284C7" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 30;30 0;0 30" dur="2.5s" begin="0.3s" repeatCount="indefinite" />
    </path>
  </g>
</svg>